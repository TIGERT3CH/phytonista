<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pythonista - Aprenda Python do Zero</title>
  <link rel="stylesheet" href="css/styles.css?v=2">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
</head>
<body>
  <div id="app">
    <nav id="navbar">
      <div class="nav-brand" onclick="navigateTo('home')">
        <span class="logo">🐍</span>
        <span class="brand-text">Pythonista</span>
      </div>
      <div class="nav-links">
        <button class="nav-btn active" data-page="home" onclick="navigateTo('home')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Início
        </button>
        <button class="nav-btn" data-page="leaderboard" onclick="navigateTo('leaderboard')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          Ranking
        </button>
        <button class="nav-btn" data-page="profile" onclick="navigateTo('profile')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Perfil
        </button>
      </div>
      <div class="nav-stats">
        <div class="stat-badge streak" title="Sequência diária">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          <span id="nav-streak">0</span>
        </div>
        <div class="stat-badge xp" title="Pontos de experiência">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          <span id="nav-xp">0</span>
        </div>
        <div class="stat-badge gems" title="Moedas">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon></svg>
          <span id="nav-gems">0</span>
        </div>
      </div>
    </nav>

    <main id="main-content">
      <div id="page-home" class="page active"></div>
      <div id="page-lesson" class="page"></div>
      <div id="page-leaderboard" class="page"></div>
      <div id="page-profile" class="page"></div>
    </main>

    <div id="toast-container"></div>
  </div>

  <script src="js/data/lessons.js?v=2"></script>
  <script src="js/store.js?v=2"></script>
  <script src="js/gamification.js?v=2"></script>
  <script src="js/editor.js?v=2"></script>
  <script src="js/exercises.js?v=2"></script>
  <script src="js/ui/home.js?v=2"></script>
  <script src="js/ui/lesson.js?v=2"></script>
  <script src="js/ui/leaderboard.js?v=2"></script>
  <script src="js/ui/profile.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
